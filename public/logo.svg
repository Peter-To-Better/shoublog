<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0" y1="56" x2="56" y2="0">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="40" x2="40" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="70" y1="40" x2="320" y2="20">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- === ICON MARK === -->
  <!-- Step 1: faded bracket -->
  <path d="M6 50 L15 43 L6 36" stroke="url(#lg1)" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Step 2: mid bracket -->
  <path d="M19 40 L28 33 L19 26" stroke="url(#lg1)" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Step 3: bright bracket -->
  <path d="M32 30 L41 23 L32 16" stroke="url(#lg2)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" opacity="1"/>

  <!-- Spark -->
  <circle cx="48" cy="12" r="3.8" fill="#06b6d4"/>
  <circle cx="48" cy="12" r="6" fill="#06b6d4" opacity="0.18"/>

  <!-- Growth trajectory -->
  <path d="M10 46 L23 34 L36 22 L48 12" stroke="url(#lg1)" stroke-width="1.2" stroke-dasharray="2.5 2.5" opacity="0.25"/>

  <!-- === WORDMARK === -->
  <!-- "peter" in bold -->
  <text x="68" y="30" font-family="'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="url(#textGrad)">peter</text>

  <!-- "-to-" connector, lighter -->
  <text x="136" y="30" font-family="'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="22" font-weight="300" letter-spacing="-0.5" fill="#94a3b8">-to-</text>

  <!-- "better" in gradient -->
  <text x="182" y="30" font-family="'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#2563eb">better</text>

  <!-- Subtitle -->
  <text x="68" y="48" font-family="'SF Pro Text', 'Helvetica Neue', -apple-system, sans-serif" font-size="11.5" font-weight="400" letter-spacing="0.5" fill="#94a3b8">一個變好變強的部落格</text>

  <!-- Small arrow accent after "better" -->
  <path d="M252 24 L258 20 L252 16" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
